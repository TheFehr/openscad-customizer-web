<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nameplate — CAD Preview</title>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
    }
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 16px; }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  main { flex: 1; display: grid; grid-template-columns: 260px 1fr; min-height: 0; }
  #controls { border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  .viewer { position: relative; overflow: hidden; }
  #preview { width: 100%; height: 100%; display: block; }

  .viewer-footer {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 16px 12px;
    background: linear-gradient(transparent, rgba(13,17,23,0.85) 40%);
    display: flex; align-items: center; justify-content: space-between;
  }
  #status { font-size: 12px; color: var(--muted); }
  #status.busy { color: var(--accent); }
  #status.error { color: #f85149; }
  #status.ok { color: #3fb950; }
  #btn-download {
    background: var(--accent); color: #0d1117; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  #btn-download:disabled { opacity: 0.35; cursor: not-allowed; }

  #debug {
    display: none; position: absolute; top: 8px; left: 8px; right: 8px; max-height: 140px;
    overflow-y: auto; background: rgba(0,0,0,0.78); border-radius: 6px; padding: 6px 8px;
    font-family: monospace; font-size: 11px; color: #adbac7; white-space: pre-wrap;
  }
  body.debug #debug { display: block; }
</style>
</head>
<body>

<header>
  <h1>Nameplate</h1>
  <p>Every control below came from nameplate.scad's own Customizer comments — nothing here is hand-built.</p>
</header>

<main>
  <nav id="controls"></nav>
  <div class="viewer">
    <canvas id="preview"></canvas>
    <div id="debug"></div>
    <div class="viewer-footer">
      <span id="status">Loading…</span>
      <button id="btn-download" disabled>⬇ Download STL</button>
    </div>
  </div>
</main>

<script type="module">
  import { OpenScadPreview } from '../../dist/index.js';

  const debugOn = new URLSearchParams(location.search).has('debug');
  if (debugOn) document.body.classList.add('debug');
  const debugEl = document.getElementById('debug');

  new OpenScadPreview({
    canvas: document.getElementById('preview'),
    controlsEl: document.getElementById('controls'),
    statusEl: document.getElementById('status'),
    downloadBtn: document.getElementById('btn-download'),
    scadUrl: './nameplate.scad',
    workerUrl: new URL('../../dist/worker.js', import.meta.url),
    storageKey: 'nameplate-preview-params',
    bedSize: 220,
    downloadName: (values) => `nameplate-${(values.label || 'blank').replace(/[^a-zA-Z0-9]/g, '') || 'blank'}`,
    // openscad-wasm ships with no fonts, so text() can't produce glyphs on its
    // own in-browser — the optional text-glyphs module renders `label` with a
    // real webfont and injects it as a `text()` override for this pass.
    textGlyphs: (values) => ({
      enabled: true,
      strings: [values.label],
      fontSize: values.text_size,
    }),
    onLog: debugOn ? (text) => {
      debugEl.textContent += text + '\n';
      debugEl.scrollTop = debugEl.scrollHeight;
    } : undefined,
  });
</script>

</body>
</html>
